<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Decidarr concept 3: "Reel Roulette" — a film reel that reads as a roulette wheel -->
  <circle cx="256" cy="256" r="248" fill="#10141a"/>
  <circle cx="256" cy="256" r="244" fill="none" stroke="#2a3442" stroke-width="4"/>
  <!-- reel body -->
  <circle cx="256" cy="266" r="186" fill="#1a212b" stroke="#d4a943" stroke-width="14"/>
  <!-- six reel holes = roulette pockets -->
  <g fill="#10141a" stroke="#2f3a49" stroke-width="4">
    <circle cx="256" cy="152" r="44"/>
    <circle cx="355" cy="209" r="44"/>
    <circle cx="355" cy="323" r="44"/>
    <circle cx="256" cy="380" r="44"/>
    <circle cx="157" cy="323" r="44"/>
    <circle cx="157" cy="209" r="44"/>
  </g>
  <!-- one lucky pocket -->
  <circle cx="355" cy="209" r="30" fill="#3fae6a"/>
  <!-- hub -->
  <circle cx="256" cy="266" r="40" fill="#d4a943"/>
  <circle cx="256" cy="266" r="14" fill="#10141a"/>
  <!-- pointer -->
  <path d="M 230 10 L 282 10 L 256 62 Z" fill="#d4a943"/>
</svg>
